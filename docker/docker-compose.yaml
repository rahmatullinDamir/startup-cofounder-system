services:
  ollama:
    image: ollama/ollama
    deploy:
      resources:
        limits:
          memory: 12G
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_LOAD_TIMEOUT=10m
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=4h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - multiagent-network

  neo4j:
    image: neo4j:5.21
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - multiagent-network

  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=secret
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=secret
      - TELEMETRY_ENABLED=false
      - LANGFUSE_INIT_EMAIL=admin@admin.com
      - LANGFUSE_INIT_PASSWORD=admin
    depends_on:
      langfuse-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "next-server"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - multiagent-network

  langfuse-db:
    image: postgres:15
    container_name: langfuse-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - multiagent-network

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: multiagent-api
    depends_on:
      ollama:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      langfuse:
        condition: service_healthy
    environment:
      - LLM_MODEL=llama3.2:3b
      - LLM_URL=http://ollama:11434/api/generate
      - EMBED_MODEL=all-minilm
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - LANGFUSE_HOST=http://langfuse:3000
      - LANGFUSE_PUBLIC_KEY=pk-langfuse
      - LANGFUSE_SECRET_KEY=sk-langfuse
    ports:
      - "8000:8000"
    volumes:
      - ../app:/app/app
      - ../llm_logs:/app/llm_logs
      - ../eval_results:/app/eval_results
    command: ["uvicorn", "app.api.server:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - multiagent-network

volumes:
  ollama_data:
  neo4j_data:
  langfuse_db:

networks:
  multiagent-network:
    driver: bridge
